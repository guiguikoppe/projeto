  <link rel="stylesheet" href="../assets/css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<body>

<header class="header reveal">
  <h1>São Paulo Futebol Clube</h1>
  <img src="../assets/img/Design sem nome (2).png" alt="Torcida do São Paulo FC" />
  <p class="slogan">O clube da fé, tradição e títulos</p>
</header>

<div class="menu-toggle" id="menuToggle">
  ☰
</div>

<!-- MENU LATERAL -->
<nav class="menu-lateral" id="menuLateral">

<!-- SEÇÃO DE TÍTULOS -->
<section class="titulos-page">
  <div class="container">
    <h2 class="section-title reveal">🏆 Nossas Conquistas</h2>
    <p class="section-subtitle reveal">Uma história repleta de glórias e títulos inesquecíveis</p>
    
    <!-- Cards de Títulos -->
    <div class="titulos-grid" id="titulosContainer">
      <!-- Os cards serão gerados pelo JavaScript -->
    </div>

<section class="estatisticas-clube reveal">

      <!-- Estatísticas geradas pelo JavaScript -->
    </div>

</section>

<!-- MOMENTOS HISTÓRICOS -->
<section class="momentos-historicos reveal">
  <div class="container">
    <h2 class="section-title">⏳ Momentos Históricos</h2>
    <div class="timeline" id="timelineContainer">
